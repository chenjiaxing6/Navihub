<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="NaviHub grand icon concept">
  <defs>
    <linearGradient id="base" x1="20" y1="8" x2="108" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientTransform="matrix(68 72 -72 68 38 25)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.62"/>
      <stop offset="0.42" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm-aura" cx="0" cy="0" r="1" gradientTransform="matrix(58 58 -58 58 87 89)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f26b3a" stop-opacity="0.52"/>
      <stop offset="0.6" stop-color="#f26b3a" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f26b3a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub" x1="44" y1="38" x2="83" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="orbit" x1="31" y1="34" x2="97" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.42" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#f26b3a"/>
    </linearGradient>
    <linearGradient id="node-warm" x1="76" y1="75" x2="101" y2="101" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb25f"/>
      <stop offset="1" stop-color="#f26b3a"/>
    </linearGradient>
    <filter id="tile-shadow" x="-20%" y="-16%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="11" flood-color="#030712" flood-opacity="0.26"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#tile-shadow)">
