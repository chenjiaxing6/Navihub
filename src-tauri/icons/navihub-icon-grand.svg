    <rect x="1" y="1" width="126" height="126" rx="28" fill="none" stroke="#030712" stroke-opacity="0.32" stroke-width="2"/>
    <rect x="3" y="3" width="122" height="122" rx="26" fill="none" stroke="#334155" stroke-opacity="0.18" stroke-width="1"/>
  </g>

